{% extends "base.html" %}
{% from "_form_helpers.html" import render_field %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1>{{ title }}</h1>
<form method="POST" novalidate>
  {{ form.hidden_tag() }}
  {{ render_field(form.nome) }}
  {{ form.submit(class="btn btn-primary") }}
</form>
{% endblock %}
